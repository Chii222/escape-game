<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暗室からの脱出</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --text: #eef3ff;
      --muted: #b8c4db;
      --line: rgba(190, 215, 255, 0.25);
      --panel-bg: rgba(7, 12, 21, 0.72);
      --panel-bg-strong: rgba(7, 12, 21, 0.88);
      --accent: rgba(140, 177, 255, 0.9);
      --warn: #ffd58c;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #070b12;
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .game {
      width: min(1200px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #05080f;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.65);
    }

    .room-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000 url('./room.png') center center / cover no-repeat;
    }

    .spot {
      position: absolute;
      border: 1px solid transparent;
      background: transparent;
      color: transparent;
      cursor: pointer;
      border-radius: 6px;
      transition: border-color .2s ease, box-shadow .2s ease, background-color .2s ease;
      outline: none;
    }

    .spot:hover,
    .spot:focus-visible {
      border-color: rgba(236, 244, 255, 0.9);
      box-shadow: 0 0 0 1px rgba(236, 244, 255, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
    }

    .desk { left: 120px; top: 470px; width: 320px; height: 160px; }
    .wall-panel { left: 130px; top: 220px; width: 140px; height: 140px; }
    .switch { left: 420px; top: 300px; width: 80px; height: 120px; }
    .door { left: 520px; top: 180px; width: 240px; height: 520px; }
    .shelf { left: 820px; top: 220px; width: 260px; height: 520px; }

    .overlay {
      position: absolute;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-bg);
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
    }

    .help { top: 12px; left: 12px; max-width: min(42ch, 55%); }

    .status-panel {
      top: 12px;
      right: 12px;
      min-width: 220px;
      background: var(--panel-bg-strong);
    }

    .inventory-panel {
      left: 12px;
      right: 12px;
      bottom: 12px;
      background: var(--panel-bg-strong);
    }

    .inventory-title { margin-bottom: 8px; font-weight: 700; }
    .inventory { display: flex; flex-wrap: wrap; gap: 8px; }

    .item {
      border: 1px solid rgba(143,176,255,0.35);
      background: rgba(143,176,255,0.14);
      color: #dbe7ff;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .item.active {
      border-color: rgba(255, 223, 145, 0.8);
      background: rgba(255, 223, 145, 0.24);
      color: #ffe6b5;
    }

    .message {
      margin-top: 8px;
      min-height: 1.3em;
      color: var(--warn);
      font-weight: 600;
    }

    .clear {
      display: none;
      margin-top: 8px;
      color: #b5ffcf;
      font-weight: 700;
    }
    .clear.show { display: block; }

    @media (max-width: 880px) {
      .room-wrap { aspect-ratio: 4 / 3; }
      .help { max-width: 75%; }
      .status-panel { font-size: 12px; min-width: 180px; }
      /* Hotspot positions are percentage-based and stay aligned responsively. */
    }
  </style>
</head>
<body>
  <div class="game">
    <section id="room" class="room-wrap" aria-label="部屋">
      <div class="overlay help">
        <strong>操作方法</strong><br>
        気になる場所をクリックして調べます。<br>
        入手したアイテムは下の持ち物欄から選択して使用します。
      </div>

      <div class="overlay status-panel" id="statusText"></div>

      <button class="spot desk" onclick="interact('desk')" aria-label="机"></button>
      <button class="spot wall-panel" onclick="interact('wall')" aria-label="壁のパネル"></button>
      <button class="spot switch" onclick="interact('switch')" aria-label="スイッチ"></button>
      <button class="spot shelf" onclick="interact('shelf')" aria-label="棚"></button>
      <button class="spot door" onclick="interact('door')" aria-label="ドア"></button>

      <div class="overlay inventory-panel">
        <div class="inventory-title">持ち物（クリックで選択）</div>
        <div class="inventory" id="inventory"></div>
        <div class="message" id="message"></div>
        <div id="clear" class="clear">鍵が回り、重いドアが開いた。脱出成功！</div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      hasDriver: false,
      panelOpened: false,
      hasFuse: false,
      lightsOn: false,
      hasKey: false,
      escaped: false
    };

    const inventory = [];
    let selectedItem = null;

    function addItem(id, name) {
      if (inventory.find(i => i.id === id)) return;
      inventory.push({ id, name });
      renderInventory();
    }

    function removeItem(id) {
      const idx = inventory.findIndex(i => i.id === id);
      if (idx >= 0) inventory.splice(idx, 1);
      if (selectedItem === id) selectedItem = null;
      renderInventory();
    }

    function renderInventory() {
      const box = document.getElementById('inventory');
      box.innerHTML = '';
      if (!inventory.length) {
        box.innerHTML = '<span style="color: var(--muted)">所持品：なし</span>';
        return;
      }

      inventory.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'item' + (selectedItem === item.id ? ' active' : '');
        btn.textContent = item.name;
        btn.onclick = () => {
          selectedItem = selectedItem === item.id ? null : item.id;
          renderInventory();
          setMessage(selectedItem ? `「${item.name}」を選択中。` : 'アイテム選択を解除した。');
        };
        box.appendChild(btn);
      });
    }

    function setMessage(text) { document.getElementById('message').textContent = text; }

    function updateStatus() {
      const status = [
        `照明：${state.lightsOn ? 'ON' : 'OFF'}`,
        `壁パネル：${state.panelOpened ? '開いている' : '閉じている'}`,
        `棚：${state.lightsOn ? (state.hasKey ? '調査済み' : '中を調べられる') : '暗くて見えない'}`,
        `ドア：${state.escaped ? '開いた' : '施錠中'}`
      ].join('<br>');

      document.getElementById('statusText').innerHTML = status;
    }

    function interact(target) {
      if (state.escaped) return;

      if (target === 'desk') {
        if (!state.hasDriver) {
          state.hasDriver = true;
          addItem('driver', 'ドライバー');
          setMessage('机の引き出しからドライバーを見つけた。');
        } else {
          setMessage('机にはもう使えそうな物はない。');
        }
      }

      if (target === 'wall') {
        if (!state.panelOpened) {
          if (selectedItem === 'driver') {
            state.panelOpened = true;
            state.hasFuse = true;
            addItem('fuse', 'ヒューズ');
            setMessage('ドライバーでパネルを外し、中からヒューズを手に入れた。');
          } else {
            setMessage('ネジ止めされている。工具が必要だ。');
          }
        } else {
          setMessage('開いたパネルの中は空だ。');
        }
      }

      if (target === 'switch') {
        if (!state.lightsOn) {
          if (selectedItem === 'fuse') {
            state.lightsOn = true;
            removeItem('fuse');
            setMessage('ヒューズを差し込むと照明が点いた。部屋が明るくなった。');
          } else {
            setMessage('電源が来ていない。ヒューズを入れられそうだ。');
          }
        } else {
          setMessage('スイッチはONのまま固定されている。');
        }
      }

      if (target === 'shelf') {
        if (!state.lightsOn) {
          setMessage('暗くて棚の奥が見えない。');
        } else if (!state.hasKey) {
          state.hasKey = true;
          addItem('key', '鍵');
          setMessage('棚の奥から小さな鍵を見つけた。');
        } else {
          setMessage('棚にはもう何もない。');
        }
      }

      if (target === 'door') {
        if (selectedItem === 'key' && state.hasKey) {
          state.escaped = true;
          document.getElementById('clear').classList.add('show');
          setMessage('鍵を使ってドアを開けた。脱出成功！');
        } else {
          setMessage('ドアは鍵がないと開かない。');
        }
      }

      updateStatus();
    }

    renderInventory();
    updateStatus();
    setMessage('まずは部屋を調べよう。');
  </script>
</body>
</html>
