<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暗室からの脱出</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #07090d;
      --panel: #0f141d;
      --panel-light: #1a2433;
      --line: rgba(183, 208, 255, 0.2);
      --text: #e8eef7;
      --muted: #9daabd;
      --accent: #8fb0ff;
      --accent-2: #546fb4;
      --warn: #ffc76f;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at 20% 10%, #1f2d42 0%, var(--bg) 55%);
      color: var(--text);
      padding: 12px;
    }

    .game {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      background: rgba(9, 13, 19, 0.95);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
    }

    header { padding: 18px 20px; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 0 6px; font-size: clamp(24px, 5vw, 34px); letter-spacing: .05em; }
    .subtitle { color: var(--muted); font-size: 14px; }

    main { padding: 16px; display: grid; gap: 14px; }

    .room {
      background: linear-gradient(180deg, #0f141d 0%, #0a0d13 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      min-height: 360px;
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
      transition: filter .35s ease, box-shadow .35s ease;
    }

    .room.dark {
      filter: brightness(0.45) saturate(0.7);
    }

    .spot {
      min-height: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
      background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      color: var(--text);
      text-align: left;
      cursor: pointer;
      position: relative;
      transition: transform .15s ease, border-color .2s ease;
    }

    .spot:active { transform: translateY(1px); }
    .spot:hover { border-color: rgba(143,176,255,0.55); }
    .spot h3 { margin: 0 0 8px; font-size: 15px; }
    .spot p { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.45; }

    .door {
      grid-column: 2;
      min-height: 190px;
      background: linear-gradient(90deg, #20160f, #322015);
      border-color: #624331;
    }

    .door::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #c6ac72;
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .panel {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 12px;
      padding: 12px;
    }

    .status { color: var(--muted); font-size: 13px; line-height: 1.65; }
    .message { min-height: 26px; color: var(--warn); font-weight: 600; }

    .inventory { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

    .item {
      border: 1px solid rgba(143,176,255,0.28);
      background: rgba(143,176,255,0.12);
      color: #d5e0ff;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .item.active {
      border-color: rgba(255, 228, 151, 0.7);
      background: rgba(255, 228, 151, 0.22);
      color: #ffe9bc;
    }

    .clear {
      display: none;
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(142, 255, 182, 0.35);
      background: rgba(76, 167, 112, 0.15);
    }

    .clear.show { display: block; }

    @media (max-width: 680px) {
      .room {
        grid-template-columns: 1fr 1fr;
        min-height: 420px;
      }
      .door { grid-column: span 2; }
      .spot { min-height: 92px; }
    }
  </style>
</head>
<body>
  <div class="game">
    <header>
      <h1>暗室からの脱出</h1>
      <div class="subtitle">アイテムを調べ、使い、扉を開けて脱出しよう。</div>
    </header>

    <main>
      <section id="room" class="room dark">
        <button class="spot" onclick="interact('desk')"><h3>机</h3><p>何か工具が置いてある。</p></button>
        <button class="spot" onclick="interact('wall')"><h3>壁のパネル</h3><p>ネジで固定されている。</p></button>
        <button class="spot" onclick="interact('shelf')"><h3>棚</h3><p>暗くて中が見えない。</p></button>
        <button class="spot" onclick="interact('switch')"><h3>スイッチ</h3><p>カバーの奥に空きスロット。</p></button>
        <button class="spot door" onclick="interact('door')"><h3>ドア</h3><p>鍵穴がある。外に出られそうだ。</p></button>
      </section>

      <section class="panel">
        <div class="card">
          <div class="status" id="statusText"></div>
        </div>
        <div class="card">
          <div><strong>持ち物（タップで選択）</strong></div>
          <div class="inventory" id="inventory"></div>
        </div>
        <div class="card">
          <div class="message" id="message"></div>
        </div>
      </section>

      <section id="clear" class="clear">
        <h2>脱出成功</h2>
        <p>鍵が回り、重いドアが開いた。冷たい夜風が差し込む。</p>
      </section>
    </main>
  </div>

  <script>
    const state = {
      hasDriver: false,
      panelOpened: false,
      hasFuse: false,
      lightsOn: false,
      hasKey: false,
      escaped: false
    };

    const inventory = [];
    let selectedItem = null;

    function addItem(id, name) {
      if (inventory.find(i => i.id === id)) return;
      inventory.push({ id, name });
      renderInventory();
    }

    function removeItem(id) {
      const idx = inventory.findIndex(i => i.id === id);
      if (idx >= 0) inventory.splice(idx, 1);
      if (selectedItem === id) selectedItem = null;
      renderInventory();
    }

    function renderInventory() {
      const box = document.getElementById("inventory");
      box.innerHTML = "";
      if (!inventory.length) {
        box.innerHTML = '<span class="status">所持品：なし</span>';
        return;
      }

      inventory.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "item" + (selectedItem === item.id ? " active" : "");
        btn.textContent = item.name;
        btn.onclick = () => {
          selectedItem = selectedItem === item.id ? null : item.id;
          renderInventory();
          setMessage(selectedItem ? `「${item.name}」を選択中。` : "アイテム選択を解除した。");
        };
        box.appendChild(btn);
      });
    }

    function setMessage(text) { document.getElementById("message").textContent = text; }

    function updateStatus() {
      const status = [
        `照明：${state.lightsOn ? "ON" : "OFF"}`,
        `壁パネル：${state.panelOpened ? "開いている" : "閉じている"}`,
        `棚：${state.lightsOn ? (state.hasKey ? "調査済み" : "中を調べられる") : "暗くて見えない"}`,
        `ドア：${state.escaped ? "開いた" : "施錠中"}`
      ].join("<br>");

      document.getElementById("statusText").innerHTML = status;
      document.getElementById("room").classList.toggle("dark", !state.lightsOn && !state.escaped);
    }

    function interact(target) {
      if (state.escaped) return;

      if (target === "desk") {
        if (!state.hasDriver) {
          state.hasDriver = true;
          addItem("driver", "ドライバー");
          setMessage("机の引き出しからドライバーを見つけた。");
        } else {
          setMessage("机にはもう使えそうな物はない。");
        }
      }

      if (target === "wall") {
        if (!state.panelOpened) {
          if (selectedItem === "driver") {
            state.panelOpened = true;
            state.hasFuse = true;
            addItem("fuse", "ヒューズ");
            setMessage("ドライバーでパネルを外し、中からヒューズを手に入れた。");
          } else {
            setMessage("ネジ止めされている。工具が必要だ。");
          }
        } else {
          setMessage("開いたパネルの中は空だ。");
        }
      }

      if (target === "switch") {
        if (!state.lightsOn) {
          if (selectedItem === "fuse") {
            state.lightsOn = true;
            removeItem("fuse");
            setMessage("ヒューズを差し込むと照明が点いた。部屋が明るくなった。");
          } else {
            setMessage("電源が来ていない。ヒューズを入れられそうだ。");
          }
        } else {
          setMessage("スイッチはONのまま固定されている。");
        }
      }

      if (target === "shelf") {
        if (!state.lightsOn) {
          setMessage("暗くて棚の奥が見えない。");
        } else if (!state.hasKey) {
          state.hasKey = true;
          addItem("key", "鍵");
          setMessage("棚の奥から小さな鍵を見つけた。");
        } else {
          setMessage("棚にはもう何もない。");
        }
      }

      if (target === "door") {
        if (selectedItem === "key" && state.hasKey) {
          state.escaped = true;
          document.getElementById("clear").classList.add("show");
          setMessage("鍵を使ってドアを開けた。脱出成功！");
        } else {
          setMessage("ドアは鍵がないと開かない。");
        }
      }

      updateStatus();
    }

    renderInventory();
    updateStatus();
    setMessage("まずは部屋を調べよう。");
  </script>
</body>
</html>
